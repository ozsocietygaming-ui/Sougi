<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sougi Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <!-- Role Switcher -->
    <nav class="p-4 bg-gray-800 border-b border-gray-700 flex justify-center gap-4 sticky top-0 z-50">
        <button onclick="showView('customer')" class="px-4 py-2 bg-blue-600 rounded hover:bg-blue-500">Customer View</button>
        <button onclick="showView('store')" class="px-4 py-2 bg-green-600 rounded hover:bg-green-500">Store Panel</button>
        <button onclick="showView('driver')" class="px-4 py-2 bg-yellow-600 rounded hover:bg-yellow-500">Driver Portal</button>
    </nav>

    <!-- Main Content Container -->
    <main id="app" class="p-6 max-w-4xl mx-auto">
        <!-- Views injected here by JS -->
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAO85-H2Rw8aCv3zS-mgDXbLX3cED8rRco", 
            authDomain: "sougi-12109.firebaseapp.com", 
            projectId: "sougi-12109", 
            storageBucket: "sougi-12109.firebasestorage.app", 
            messagingSenderId: "1001716494860", 
            appId: "1:1001716494860:web:a03facb4ab30499467f429" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Global State
        let currentRole = 'customer';
        const appDiv = document.getElementById('app');

        window.showView = (role) => {
            currentRole = role;
            render();
        };

        function render() {
            if (currentRole === 'customer') {
                appDiv.innerHTML = `
                    <h1 class="text-2xl mb-4 font-bold">Available Stores</h1>
                    <div id="store-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                    <h2 class="text-xl mt-8 mb-4">Your Cart</h2>
                    <div id="cart-list" class="bg-gray-800 p-4 rounded">Empty</div>
                `;
                // Logic to fetch and display stores
                onValue(ref(db, 'stores'), (snapshot) => {
                    const stores = snapshot.val() || {};
                    document.getElementById('store-grid').innerHTML = Object.entries(stores).map(([id, s]) => `
                        <div class="p-4 bg-gray-800 rounded border border-gray-700">
                            <h3 class="text-lg font-bold">${s.name}</h3>
                            <button onclick="alert('Store: ${s.name}')" class="mt-2 text-blue-400">View Products</button>
                        </div>
                    `).join('');
                });
            } else if (currentRole === 'store') {
                appDiv.innerHTML = `
                    <h1 class="text-2xl mb-4">Store Panel</h1>
                    <input id="storeName" placeholder="Store Name" class="w-full p-2 bg-gray-700 text-white rounded mb-2">
                    <button onclick="saveStore()" class="bg-green-600 px-4 py-2 rounded">Save Store</button>
                    <div class="mt-6" id="order-list"></div>
                `;
            } else {
                appDiv.innerHTML = `
                    <h1 class="text-2xl mb-4">Driver Portal</h1>
                    <button onclick="toggleDriver()" class="bg-yellow-600 px-4 py-2 rounded">Toggle Availability</button>
                    <div class="mt-6" id="jobs-list"></div>
                `;
            }
        }

        // Simple helper actions
        window.saveStore = () => {
            const name = document.getElementById('storeName').value;
            set(ref(db, 'stores/store1'), { name });
            alert('Store updated!');
        };

        render();
    </script>
</body>
</html>
