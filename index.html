<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sougi — Livraison & Logistique</title>
<meta name="theme-color" content="#0B6E4F">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          bazaar:  { DEFAULT: '#0B6E4F', dark: '#08543C', light: '#0F8C63' },
          souk:    { DEFAULT: '#F2A63A', dark: '#D98A1E', light: '#FBCB7E' },
          clay:    { DEFAULT: '#C1502E', dark: '#9C3E22' },
          cream:   '#FBF6EC',
          paper:   '#FFFFFF',
          ink:     '#1E2321',
          inkfade: '#5B655F',
          mint:    '#E7F2EC',
          line:    '#E4DCC9'
        },
        fontFamily: {
          display: ['Cairo', 'sans-serif'],
          body: ['Inter', 'sans-serif'],
          mono: ['IBM Plex Mono', 'monospace']
        },
        borderRadius: { '2xl': '1.1rem', '3xl': '1.6rem' },
        boxShadow: {
          card: '0 1px 2px rgba(30,35,33,0.04), 0 8px 24px -12px rgba(30,35,33,0.18)',
          pop:  '0 10px 30px -8px rgba(11,110,79,0.35)'
        }
      }
    }
  }
</script>

<style>
  html, body { font-family: 'Inter', sans-serif; background: #FBF6EC; color: #1E2321; -webkit-tap-highlight-color: transparent; }
  * { -webkit-font-smoothing: antialiased; }
  .font-display { font-family: 'Cairo', sans-serif; }
  .font-mono { font-family: 'IBM Plex Mono', monospace; }

  #app-viewport { max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; background: #FBF6EC; }
  ::-webkit-scrollbar { width: 0; height: 0; }

  @keyframes riseIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .rise-in { animation: riseIn .35s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes popIn { from { opacity: 0; transform: scale(.94); } to { opacity: 1; transform: scale(1); } }
  .pop-in { animation: popIn .28s ease both; }
  @keyframes toastIn { from { opacity:0; transform: translate(-50%, 12px); } to { opacity:1; transform: translate(-50%,0); } }

  /* Premium perforated ticket edge for store display card */
  .ticket-edge { position: relative; }
  .ticket-edge::before, .ticket-edge::after {
    content: ''; position: absolute; width: 22px; height: 22px; background: #FBF6EC;
    border-radius: 50%; top: 50%; transform: translateY(-50%);
  }
  .ticket-edge::before { left: -11px; }
  .ticket-edge::after { right: -11px; }
  
  /* Smooth switch styling */
  .switch { width: 46px; height: 26px; border-radius: 999px; position: relative; transition: background-color .2s ease-in-out; }
  .switch::after {
    content: ''; position: absolute; width: 20px; height: 20px; border-radius: 999px; background: #fff;
    top: 3px; left: 3px; transition: transform .2s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 1px 3px rgba(0,0,0,.3);
  }
  .switch.on::after { transform: translateX(20px); }

  input:focus, textarea:focus, select:focus {
    outline: none; border-color: #0B6E4F; box-shadow: 0 0 0 3px rgba(11, 110, 79, 0.15);
  }
</style>
</head>
<body>

<div id="app-viewport" class="flex flex-col shadow-2xl">
  <div id="app" class="flex-1 pb-24"></div>
  <div id="toast-host" class="fixed bottom-24 left-1/2 z-[999] -translate-x-1/2 pointer-events-none"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, doc, setDoc, updateDoc, deleteDoc,
  onSnapshot, query, where, getDoc, getDocs, serverTimestamp,
  increment, arrayUnion, arrayRemove, orderBy
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

/* ---------------------- Global State & Configuration ---------------------- */
const S = {
  db: null,
  app: null,
  config: {
    apiKey: "AIzaSyAO85-H2Rw8aCv3zS-mgDXbLX3cED8rRco",
    authDomain: "sougi-12109.firebaseapp.com",
    projectId: "sougi-12109",
    storageBucket: "sougi-12109.firebasestorage.app",
    messagingSenderId: "1001716494860",
    appId: "1:1001716494860:web:a03facb4ab30499467f429"
  },
  role: null,          // 'admin' | 'grocery' | 'agent' | 'client'
  profiles: {},         // Saves session tokens locally per role { role: { uid, name, phone } }
  unsub: {},            // Active Firestore real-time unsubscribe hooks
  data: {
    users: [],
    stores: [],
    products: [],
    orders: []
  },
  client: {
    activeStoreId: null,
    cart: {}            // { productId: qty }
  },
  devBarOpen: true,
  _createRole: 'grocery'
};

const $app = document.getElementById('app');
const $toasts = document.getElementById('toast-host');

/* ---------------------- Helper Utilities ---------------------- */
function generateUID() {
  return 'u_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
}
function fmtDA(n) {
  return Number(n || 0).toLocaleString('fr-FR').replace(/\u00A0/g, ' ') + ' DA';
}
function storeCodeFromId(id) {
  let h = 0;
  for (let i = 0; i < id.length; i++) { h = (h * 31 + id.charCodeAt(i)) >>> 0; }
  return String(10000 + (h % 90000));
}
function esc(str) {
  return String(str ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  const bg = type === 'err' ? 'bg-clay' : type === 'info' ? 'bg-ink' : 'bg-bazaar';
  el.className = `${bg} text-white text-xs font-semibold px-4 py-3 rounded-2xl shadow-pop mb-2 flex items-center gap-2 max-w-[320px] pointer-events-auto`;
  el.style.animation = 'toastIn .25s ease both';
  el.innerHTML = `<i class="fa-solid ${type === 'err' ? 'fa-circle-exclamation' : type === 'info' ? 'fa-circle-info' : 'fa-circle-check'}"></i><span>${esc(msg)}</span>`;
  $toasts.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 2500);
}
function timeAgo(ts) {
  if (!ts) return "À l'instant";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const s = Math.max(1, Math.floor((Date.now() - d.getTime()) / 1000));
  if (s < 60) return `il y a ${s}s`;
  if (s < 3600) return `il y a ${Math.floor(s/60)}m`;
  if (s < 86400) return `il y a ${Math.floor(s/3600)}h`;
  return `il y a ${Math.floor(s/86400)}j`;
}

/* ---------------------- Persistent State Loader ---------------------- */
function loadLocalData() {
  try { S.profiles = JSON.parse(localStorage.getItem('sougi_profiles') || '{}'); } catch { S.profiles = {}; }
  S.role = localStorage.getItem('sougi_role') || null;
  try { S.client.cart = JSON.parse(localStorage.getItem('sougi_cart') || '{}'); } catch { S.client.cart = {}; }
}
function saveProfiles() { localStorage.setItem('sougi_profiles', JSON.stringify(S.profiles)); }
function saveRole() { localStorage.setItem('sougi_role', S.role || ''); }
function saveCart() { localStorage.setItem('sougi_cart', JSON.stringify(S.client.cart)); }

/* ---------------------- Firebase SDK Initiation ---------------------- */
function initFirebase() {
  try {
    S.app = initializeApp(S.config);
    S.db = getFirestore(S.app);
  } catch (err) {
    toast("Erreur d'initialisation Firebase. Vérifiez la configuration.", "err");
  }
}

/* ---------------------- Real-Time Subscriptions ---------------------- */
function stopSubscriptions() {
  Object.values(S.unsub).forEach(fn => { try { fn(); } catch {} });
  S.unsub = {};
}
function startRealtimeSync() {
  stopSubscriptions();
  if (!S.db) return;

  S.unsub.users = onSnapshot(collection(S.db, 'users'), snap => {
    S.data.users = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });

  S.unsub.stores = onSnapshot(collection(S.db, 'stores'), snap => {
    S.data.stores = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });

  S.unsub.products = onSnapshot(collection(S.db, 'products'), snap => {
    S.data.products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });

  S.unsub.orders = onSnapshot(collection(S.db, 'orders'), snap => {
    S.data.orders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });
}

/* ---------------------- Shared UI Templates ---------------------- */
function renderDevBar() {
  const roles = [
    { key: 'admin', label: 'Super Admin', icon: 'fa-user-shield' },
    { key: 'grocery', label: 'Épicerie', icon: 'fa-store' },
    { key: 'agent', label: 'Livreur', icon: 'fa-motorcycle' },
    { key: 'client', label: 'Client', icon: 'fa-user' }
  ];
  return `
  <div class="bg-ink text-white text-xs sticky top-0 z-50">
    <button id="devbar-toggle" class="w-full flex items-center justify-between px-4 py-2.5 bg-ink/95 border-b border-white/5">
      <span class="flex items-center gap-2 font-semibold font-display"><i class="fa-solid fa-flask-vial text-souk"></i> Panneau Multi-Rôles — ${roles.find(r=>r.key===S.role)?.label || 'Non Connecté'}</span>
      <i class="fa-solid fa-chevron-${S.devBarOpen ? 'up' : 'down'} text-white/55"></i>
    </button>
    ${S.devBarOpen ? `
    <div class="px-4 pb-3 pt-2 grid grid-cols-4 gap-1.5 rise-in">
      ${roles.map(r => `
        <button data-role="${r.key}" class="devbar-role flex flex-col items-center gap-1 py-2 rounded-xl transition ${S.role === r.key ? 'bg-bazaar font-bold text-white' : 'bg-white/5 hover:bg-white/10 text-white/70'}">
          <i class="fa-solid ${r.icon} text-[13px]"></i>
          <span class="text-[9px]">${r.label}</span>
        </button>`).join('')}
    </div>` : ''}
  </div>`;
}

function renderLoginGate() {
  const roleMeta = {
    admin:   { title: 'Connexion Admin', icon: 'fa-user-shield', hint: 'Gérez la plateforme, les boutiques et les livreurs partenaires.' },
    grocery: { title: 'Espace Partenaire Épicerie', icon: 'fa-store', hint: 'Inscrivez votre commerce, gérez vos stocks et préparez les commandes.' },
    agent:   { title: 'Espace Livreur', icon: 'fa-motorcycle', hint: 'Activez votre statut pour recevoir les courses et livrer vos colis.' },
    client:  { title: 'Espace Client', icon: 'fa-user', hint: 'Rejoignez votre boutique favorite et passez votre commande de livraison.' }
  }[S.role];

  return `
  <div class="px-6 py-12 rise-in">
    <div class="w-14 h-14 rounded-2xl bg-mint text-bazaar flex items-center justify-center mb-5 shadow-card">
      <i class="fa-solid ${roleMeta.icon} text-xl"></i>
    </div>
    <h2 class="font-display font-black text-2xl text-ink">${roleMeta.title}</h2>
    <p class="text-inkfade text-sm mt-1 mb-6 leading-relaxed">${roleMeta.hint}</p>
    <form id="login-form" class="bg-paper rounded-3xl shadow-card p-5 space-y-4">
      <div>
        <label class="text-[10px] font-bold text-inkfade uppercase tracking-widest font-display">Nom Complet</label>
        <input required name="name" class="w-full mt-1.5 px-3.5 py-3 rounded-xl border border-line text-sm" placeholder="${S.role === 'grocery' ? 'Ex. Supermarché El Hidhab' : 'Ex. Amine Zaïdi'}">
      </div>
      <div>
        <label class="text-[10px] font-bold text-inkfade uppercase tracking-widest font-display">Téléphone</label>
        <input required name="phone" pattern="0[5-7][0-9]{8}" class="w-full mt-1.5 px-3.5 py-3 rounded-xl border border-line text-sm font-mono" placeholder="05xxxxxxxx / 06/07...">
      </div>
      ${S.role === 'grocery' ? `
      <div>
        <label class="text-[10px] font-bold text-inkfade uppercase tracking-widest font-display">Adresse de la Boutique</label>
        <input required name="address" class="w-full mt-1.5 px-3.5 py-3 rounded-xl border border-line text-sm" placeholder="Ex. Cité 1014 logts, Sétif">
      </div>` : ''}
      <button type="submit" class="w-full bg-bazaar hover:bg-bazaar-dark text-white font-bold rounded-xl py-3.5 mt-2 transition shadow-pop flex items-center justify-center gap-2">
        <span>Commencer</span> <i class="fa-solid fa-arrow-right text-xs"></i>
      </button>
    </form>
  </div>`;
}

function topHeader(title, subtitle) {
  return `
  <div class="px-5 pt-5 pb-4 flex items-center justify-between border-b border-line bg-paper">
    <div>
      <h1 class="font-display font-black text-xl text-ink leading-tight">${title}</h1>
      ${subtitle ? `<p class="text-xs text-inkfade mt-0.5 font-medium">${subtitle}</p>` : ''}
    </div>
    <button id="switch-profile" class="w-9 h-9 rounded-xl bg-mint text-bazaar flex items-center justify-center transition hover:bg-bazaar hover:text-white" title="Se déconnecter">
      <i class="fa-solid fa-power-off text-sm"></i>
    </button>
  </div>`;
}

function renderBottomNav() {
  const tabs = {
    admin:   [ ['dashboard','fa-chart-line','Aperçu'], ['stores','fa-store','Boutiques'], ['agents','fa-motorcycle','Livreurs'], ['create','fa-user-plus','Créer'] ],
    grocery: [ ['orders','fa-receipt','Commandes'], ['inventory','fa-boxes-stacked','Stock'], ['qr','fa-qrcode','Mon QR Code'], ['profile','fa-sliders','Paramètres'] ],
    agent:   [ ['tasks','fa-route','Courses'], ['profile','fa-user','Statistiques'] ],
    client:  [ ['stores','fa-shop','Épiceries'], ['cart','fa-cart-shopping','Panier'], ['orders','fa-receipt','Mes Commandes'], ['profile','fa-user','Mon Compte'] ]
  }[S.role];

  const current = S._tab[S.role] || tabs[0][0];
  const cartCount = Object.values(S.client.cart).reduce((a,b) => a+b, 0);

  return `
  <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] bg-paper border-t border-line px-2 pt-2.5 pb-[max(0.6rem,env(safe-area-inset-bottom))] flex z-40 shadow-2xl">
    ${tabs.map(([key, icon, label]) => `
      <button data-tab="${key}" class="nav-tab flex-1 flex flex-col items-center gap-1.5 py-1 relative ${current === key ? 'text-bazaar' : 'text-inkfade hover:text-ink'} transition">
        <span class="relative">
          <i class="fa-solid ${icon} text-lg"></i>
          ${key === 'cart' && cartCount > 0 ? `<span class="absolute -top-1.5 -right-2 bg-clay text-white text-[9px] font-bold rounded-full w-4 h-4 flex items-center justify-center animate-bounce">${cartCount}</span>` : ''}
        </span>
        <span class="text-[9px] font-bold uppercase tracking-wider font-display leading-none">${label}</span>
      </button>`).join('')}
  </div>`;
}

function bindCommonControls() {
  document.getElementById('devbar-toggle')?.addEventListener('click', () => { S.devBarOpen = !S.devBarOpen; render(); });
  document.querySelectorAll('.devbar-role').forEach(btn => {
    btn.addEventListener('click', () => {
      S.role = btn.dataset.role;
      saveRole();
      render();
    });
  });
  document.getElementById('switch-profile')?.addEventListener('click', () => {
    if (confirm('Se déconnecter de ce profil ?')) {
      delete S.profiles[S.role];
      saveProfiles();
      render();
    }
  });
  document.querySelectorAll('.nav-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      S._tab[S.role] = btn.dataset.tab;
      render();
    });
  });
}

function bindLoginGate() {
  document.getElementById('login-form')?.addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const name = fd.get('name').trim();
    const phone = fd.get('phone').trim();
    const address = fd.get('address')?.trim() || '';
    const id = generateUID();

    try {
      await setDoc(doc(S.db, 'users', id), {
        uid: id, name, phone, role: S.role,
        activeStatus: S.role === 'agent' ? false : true,
        createdAt: serverTimestamp()
      });
      if (S.role === 'grocery') {
        await setDoc(doc(S.db, 'stores', id), {
          id, storeName: name, phone, address, favoriteCount: 0, createdAt: serverTimestamp()
        });
      }
      S.profiles[S.role] = { uid: id, name, phone };
      saveProfiles();
      toast('Bienvenue, ' + name);
      render();
    } catch (err) {
      toast('Erreur : ' + err.message, 'err');
    }
  });
}

/* ==========================================================================
   ROLE: SUPER ADMIN SCREEN
   ========================================================================== */
function renderAdmin() {
  const tab = S._tab.admin || 'dashboard';
  const stores = S.data.stores;
  const agents = S.data.users.filter(u => u.role === 'agent');
  const orders = S.data.orders;
  const activeOrders = orders.filter(o => !['delivered','cancelled'].includes(o.status));

  let body = '';
  if (tab === 'dashboard') {
    body = `
    <div class="px-5 mt-4 space-y-4 rise-in">
      <div class="grid grid-cols-3 gap-3">
        ${renderMetricCard('fa-receipt', activeOrders.length, 'Livraisons Actives', 'text-clay', 'bg-clay/10')}
        ${renderMetricCard('fa-store', stores.length, 'Épiceries', 'text-bazaar', 'bg-mint')}
        ${renderMetricCard('fa-motorcycle', agents.filter(a=>a.activeStatus).length, 'Livreurs Actifs', 'text-souk-dark', 'bg-souk/15')}
      </div>
      
      <div class="bg-paper rounded-3xl p-4 shadow-card">
        <h3 class="font-display font-black text-sm text-ink mb-3 uppercase tracking-wide">Flux en Temps Réel</h3>
        ${orders.length === 0 ? renderEmptyState('fa-inbox', 'Aucune commande enregistrée') :
          [...orders].sort((a,b)=> (b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)).slice(0,6).map(o => `
          <div class="flex items-center justify-between py-3 border-b border-line last:border-0 text-xs">
            <div>
              <p class="font-semibold text-ink">${esc(o.clientName)}</p>
              <p class="text-[10px] text-inkfade mt-0.5">${esc(getStoreName(o.storeId))} · ${timeAgo(o.createdAt)}</p>
            </div>
            ${renderStatusTag(o.status)}
          </div>`).join('')}
      </div>
    </div>`;
  } else if (tab === 'stores') {
    body = `
    <div class="px-5 mt-4 space-y-3 rise-in">
      ${stores.length === 0 ? renderEmptyState('fa-store-slash', "Pas d'épicerie enregistrée") : stores.map(st => `
      <div class="bg-paper rounded-2xl shadow-card p-4 flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-mint flex items-center justify-center text-bazaar"><i class="fa-solid fa-store"></i></div>
        <div class="flex-1 min-w-0">
          <p class="font-bold text-sm text-ink truncate">${esc(st.storeName)}</p>
          <p class="text-[11px] text-inkfade truncate">${esc(st.address || 'Aucune adresse renseignée')}</p>
        </div>
        <div class="text-right">
          <p class="text-[9px] text-inkfade uppercase tracking-wide">Code 5D</p>
          <p class="font-mono text-xs font-black text-bazaar">${storeCodeFromId(st.id)}</p>
        </div>
      </div>`).join('')}
    </div>`;
  } else if (tab === 'agents') {
    body = `
    <div class="px-5 mt-4 space-y-3 rise-in">
      ${agents.length === 0 ? renderEmptyState('fa-motorcycle', 'Pas de livreur enregistré') : agents.map(a => `
      <div class="bg-paper rounded-2xl shadow-card p-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-clay/10 text-clay flex items-center justify-center"><i class="fa-solid fa-motorcycle"></i></div>
          <div>
            <p class="font-bold text-sm text-ink">${esc(a.name)}</p>
            <p class="text-[11px] text-inkfade font-mono">${esc(a.phone)}</p>
          </div>
        </div>
        <span class="flex items-center gap-1.5 text-[10px] font-bold ${a.activeStatus ? 'text-bazaar' : 'text-inkfade'}">
          <span class="w-2 h-2 rounded-full ${a.activeStatus ? 'bg-bazaar animate-pulse' : 'bg-inkfade'}"></span>
          ${a.activeStatus ? 'En Ligne' : 'Hors Ligne'}
        </span>
      </div>`).join('')}
    </div>`;
  } else if (tab === 'create') {
    body = `
    <div class="px-5 mt-4 rise-in">
      <div class="bg-paper rounded-3xl shadow-card p-5">
        <div class="flex gap-2 mb-4 bg-cream p-1 rounded-xl">
          <button data-role-select="grocery" class="role-selector-btn flex-1 py-2 text-xs font-bold rounded-lg transition ${S._createRole === 'grocery' ? 'bg-bazaar text-white' : 'text-inkfade'}">Épicerie</button>
          <button data-role-select="agent" class="role-selector-btn flex-1 py-2 text-xs font-bold rounded-lg transition ${S._createRole === 'agent' ? 'bg-bazaar text-white' : 'text-inkfade'}">Livreur</button>
        </div>
        <form id="admin-manual-create" class="space-y-4">
          <div>
            <label class="text-[10px] font-bold text-inkfade uppercase tracking-widest font-display">Nom Complet / Enseigne</label>
            <input required name="name" class="w-full mt-1 px-3.5 py-2.5 rounded-xl border border-line text-sm">
          </div>
          <div>
            <label class="text-[10px] font-bold text-inkfade uppercase tracking-widest font-display">Téléphone</label>
            <input required name="phone" pattern="0[5-7][0-9]{8}" placeholder="05xxxxxxxx" class="w-full mt-1 px-3.5 py-2.5 rounded-xl border border-line text-sm font-mono">
          </div>
          ${S._createRole === 'grocery' ? `
          <div>
            <label class="text-[10px] font-bold text-inkfade uppercase tracking-widest font-display">Adresse de la Boutique</label>
            <input required name="address" class="w-full mt-1 px-3.5 py-2.5 rounded-xl border border-line text-sm">
          </div>` : ''}
          <button type="submit" class="w-full bg-bazaar text-white font-bold rounded-xl py-3 mt-2 shadow-pop transition">
            Créer le Compte
          </button>
        </form>
      </div>
    </div>`;
  }

  $app.innerHTML = `
    ${renderDevBar()}
    ${topHeader('Super-Administrateur', S.profiles.admin?.name)}
    ${body}
    ${renderBottomNav()}
  `;

  bindCommonControls();
  if (tab === 'create') {
    document.querySelectorAll('.role-selector-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        S._createRole = btn.dataset.roleSelect;
        renderAdmin();
      });
    });
    document.getElementById('admin-manual-create')?.addEventListener('submit', async e => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const name = fd.get('name').trim();
      const phone = fd.get('phone').trim();
      const address = fd.get('address')?.trim() || '';
      const id = generateUID();

      try {
        await setDoc(doc(S.db, 'users', id), {
          uid: id, name, phone, role: S._createRole, activeStatus: S._createRole === 'agent' ? false : true, createdAt: serverTimestamp()
        });
        if (S._createRole === 'grocery') {
          await setDoc(doc(S.db, 'stores', id), {
            id, storeName: name, phone, address, favoriteCount: 0, createdAt: serverTimestamp()
          });
        }
        toast(`Compte ${S._createRole} créé !`);
        e.target.reset();
      } catch (err) {
        toast('Erreur : ' + err.message, 'err');
      }
    });
  }
}

function renderMetricCard(icon, value, label, textCls, bgCls) {
  return `
  <div class="bg-paper rounded-2xl p-4 shadow-card text-center flex flex-col items-center">
    <div class="w-8 h-8 rounded-xl ${bgCls} flex items-center justify-center ${textCls} mb-2"><i class="fa-solid ${icon} text-xs"></i></div>
    <p class="font-display font-black text-lg text-ink leading-none">${value}</p>
    <p class="text-[9px] text-inkfade font-semibold mt-1 leading-tight uppercase tracking-wider">${label}</p>
  </div>`;
}

function renderEmptyState(icon, msg) {
  return `
  <div class="py-12 text-center text-inkfade">
    <i class="fa-solid ${icon} text-3xl mb-3 opacity-40"></i>
    <p class="text-xs font-semibold font-display">${msg}</p>
  </div>`;
}

function getStoreName(id) {
  return S.data.stores.find(s => s.id === id)?.storeName || 'Boutique';
}

function renderStatusTag(status) {
  const meta = {
    pending:   ['En Attente', 'bg-souk/15 text-souk-dark'],
    assigned:  ['Assignée', 'bg-blue-100 text-blue-700'],
    picked_up: ['En Route', 'bg-mint text-bazaar'],
    delivered: ['Livrée', 'bg-bazaar text-white'],
    cancelled: ['Annulée', 'bg-clay/10 text-clay']
  }[status] || ['Inconnu', 'bg-line text-inkfade'];
  return `<span class="text-[9px] font-bold uppercase tracking-wider px-2 py-1 rounded-full ${meta[1]}">${meta[0]}</span>`;
}

/* ==========================================================================
   ROLE: STORE OWNER (GROCERY / ATELIER)
   ========================================================================== */
function renderGrocery() {

            <div class="flex justify-between font-medium">

            <span class="font-mono text-bazaar">${fmtDA(o.totalAmount + o.deliveryFee)}</span>
          </div>
        </div>

        ${o.status === 'pending' ? `
        <div class="pt-2 space-y-3">
          <div class="flex items-center justify-between bg-cream px-3 py-2.5 rounded-xl">
            <div>
              <p class="text-xs font-bold text-ink flex items-center gap-1.5"><i class="fa-solid fa-hand-holding-dollar text-bazaar"></i> Workflow Amana</p>
              <p class="text-[10px] text-inkfade leading-tight">Livreur paye d'avance à la boutique au retrait</p>
            </div>
            <button data-amana-toggle="${o.id}" data-active="${o.cashWorkflow === 'upfront_by_agent'}" class="switch ${o.cashWorkflow === 'upfront_by_agent' ? 'on bg-bazaar' : 'bg-line'}"></button>
          </div>
          <select data-assign-order="${o.id}" class="w-full px-3 py-3 rounded-xl border border-line text-xs font-semibold bg-white">
            <option value="">Assigner un livreur actif...</option>
            ${onlineAgents.map(a => `<option value="${a.uid}">${esc(a.name)} (${esc(a.phone)})</option>`).join('')}
          </select>
          ${onlineAgents.length === 0 ? `<p class="text-[10px] text-clay font-semibold text-center"><i class="fa-solid fa-triangle-exclamation"></i> Aucun livreur connecté "En Ligne" actuellement</p>` : ''}
        </div>` : `
        <div class="pt-1 flex items-center justify-between text-[11px] text-inkfade font-semibold">
          <span>Mode : <b class="${o.cashWorkflow === 'upfront_by_agent' ? 'text-clay' : 'text-bazaar'}">${o.cashWorkflow === 'upfront_by_agent' ? 'AMANA (Upfront)' : 'Remise Standard'}</b></span>
          ${o.agentId ? `<span>Livreur : <b class="text-ink">${esc(S.data.users.find(u=>u.uid === o.agentId)?.name || 'Livreur')}</b></span>` : ''}
        </div>`}
      </div>`).join('')}
    </div>`;
  } else if (tab === 'inventory') {
    body = `
    <div class="px-5 mt-4 space-y-4 rise-in">
      <button id="trigger-add-product" class="w-full border-2 border-dashed border-bazaar/40 text-bazaar hover:bg-mint/30 rounded-2xl py-3.5 text-xs font-bold uppercase tracking-wider flex items-center justify-center gap-2">
        <i class="fa-solid fa-plus"></i> Ajouter un article au catalogue
      </button>
      <div id="product-panel"></div>
      <div class="space-y-3">
        ${myProducts.length === 0 ? renderEmptyState('fa-boxes-stacked', 'Aucun produit disponible dans votre catalogue') : myProducts.map(p => `
        <div class="bg-paper rounded-2xl shadow-card p-3 flex items-center gap-3">
          <img src="${p.imageUrl || 'https://placehold.co/120x120/E7F2EC/0B6E4F?text=%F0%9F%9B%92'}" class="w-12 h-12 rounded-xl object-cover bg-mint border border-line">
          <div class="flex-1 min-w-0">
            <p class="font-bold text-sm text-ink truncate">${esc(p.name)}</p>
            <p class="text-[11px] text-inkfade">${esc(p.category)} · <b class="font-mono text-ink font-semibold">${fmtDA(p.price)}</b></p>
          </div>
          <div class="flex items-center gap-2">
            <button data-product-stock-toggle="${p.id}" data-current-state="${p.stockStatus}" class="px-3 py-1.5 text-[9px] font-bold uppercase tracking-wider rounded-xl transition ${p.stockStatus ? 'bg-mint text-bazaar' : 'bg-clay/10 text-clay'}">
              ${p.stockStatus ? 'En Stock' : 'Épuisé'}
            </button>
            <button data-product-delete="${p.id}" class="w-8 h-8 rounded-xl bg-clay/10 hover:bg-clay hover:text-white text-clay flex items-center justify-center transition"><i class="fa-solid fa-trash-can text-xs"></i></button>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  } else if (tab === 'qr') {
    const storeCode = storeCodeFromId(me.uid);
    body = `
    <div class="px-6 mt-4 rise-in">
      <div class="bg-bazaar rounded-3xl shadow-pop p-6 relative overflow-hidden ticket-edge">
        <div class="absolute top-4 right-4 stamp text-[9px] font-black border-2 border-white/40 border-dashed text-white/80 rounded-full px-3 py-1 tracking-widest transform -rotate-12">SOUP CONTRAT</div>
        <p class="text-white/70 text-[10px] font-bold uppercase tracking-widest mb-1 font-display">Identifiant Magasin</p>
        <h2 class="font-display font-black text-white text-lg mb-4 truncate">${esc(store.storeName)}</h2>
        <div class="bg-white rounded-2xl p-4 flex justify-center shadow-card" id="qr-holder"></div>
        <div class="flex items-center justify-center gap-1 mt-4 text-white/30 font-mono tracking-widest text-[9px]">
          ${'•'.repeat(24)}
        </div>
        <div class="text-center mt-3">
          <p class="text-white/60 text-[10px] font-medium">Votre Code d'Appairage Client (5 Chiffres)</p>
          <p class="font-mono text-3xl font-bold text-white tracking-[0.25em] mt-1">${storeCode}</p>
        </div>
      </div>
      <p class="text-center text-xs text-inkfade mt-4 leading-relaxed px-2">Les clients scannent ce code QR ou entrent manuellement votre code pour vous enregistrer parmi leurs favoris et commander.</p>
    </div>`;
  } else if (tab === 'profile') {
    body = `
    <div class="px-5 mt-4 space-y-4 rise-in">
      <div class="bg-paper rounded-3xl shadow-card p-5">
        <form id="store-profile-update" class="space-y-4">
          <div>
            <label class="text-[10px] font-bold text-inkfade uppercase tracking-widest font-display">Enseigne Commerciale</label>
            <input name="storeName" value="${esc(store.storeName)}" class="w-full mt-1.5 px-3.5 py-2.5 rounded-xl border border-line text-sm">
          </div>
          <div>
            <label class="text-[10px] font-bold text-inkfade uppercase tracking-widest font-display">Téléphone de l'Épicerie</label>
            <input name="phone" value="${esc(store.phone)}" pattern="0[5-7][0-9]{8}" class="w-full mt-1.5 px-3.5 py-2.5 rounded-xl border border-line text-sm font-mono">
          </div>
          <div>
            <label class="text-[10px] font-bold text-inkfade uppercase tracking-widest font-display">Adresse Physique</label>
            <textarea name="address" rows="2" class="w-full mt-1.5 px-3.5 py-2.5 rounded-xl border border-line text-sm">${esc(store.address || '')}</textarea>
          </div>
          <button class="w-full bg-bazaar text-white font-bold rounded-xl py-3 mt-1 shadow-pop transition">Enregistrer les Modifications</button>
        </form>
      </div>
      <div class="bg-paper rounded-2xl shadow-card p-4 flex items-center justify-between">
        <p class="text-xs font-bold text-ink">Boutique mise en favorite par</p>
        <span class="font-display font-black text-xl text-bazaar">${store.favoriteCount || 0} <span class="text-xs font-body font-bold text-inkfade">Clients</span></span>
      </div>
    </div>`;
  }

  $app.innerHTML = `
    ${renderDevBar()}
    ${topHeader('Espace Épicerie', store.storeName)}
    ${body}
    ${renderBottomNav()}
  `;

  bindCommonControls();
  
  if (tab === 'orders') {
    document.querySelectorAll('[data-amana-toggle]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const orderId = btn.dataset.amanaToggle;
        const currentActive = btn.dataset.active === 'true';
        try {
          await updateDoc(doc(S.db, 'orders', orderId), {
            cashWorkflow: currentActive ? 'collected_on_delivery' : 'upfront_by_agent'
          });
          toast(currentActive ? 'Amana désactivé' : 'Amana activé avec succès');
        } catch (err) { toast('Erreur : ' + err.message, 'err'); }
      });
    });
    document.querySelectorAll('[data-assign-order]').forEach(sel => {
      sel.addEventListener('change', async () => {
        const agentId = sel.value;
        if (!agentId) return;
        const orderId = sel.dataset.assignOrder;
        try {
          await updateDoc(doc(S.db, 'orders', orderId), {
            agentId, status: 'assigned'
          });
          toast('Commande attribuée au livreur !');
        } catch (err) { toast('Erreur : ' + err.message, 'err'); }
      });
    });
  }

  if (tab === 'inventory') {
    document.getElementById('trigger-add-product')?.addEventListener('click', () => {
      const panel = document.getElementById('product-panel');
      panel.innerHTML = `
      <form id="add-product-form" class="bg-paper rounded-3xl shadow-card p-4 mb-4 space-y-3 pop-in">
        <h4 class="font-display font-bold text-xs uppercase tracking-wide text-ink">Nouvel Article</h4>
        <input required name="name" placeholder="Nom du produit" class="w-full px-3.5 py-2.5 rounded-xl border border-line text-sm">
        <div class="grid grid-cols-2 gap-2">
          <input required type="number" min="0" name="price" placeholder="Prix (DA)" class="w-full px-3.5 py-2.5 rounded-xl border border-line text-sm font-mono">
          <select name="category" class="px-3.5 py-2.5 rounded-xl border border-line text-xs font-semibold bg-white text-ink">
            <option>Épicerie</option>
            <option>Produits Frais</option>
            <option>Boissons</option>
            <option>Boulangerie</option>
            <option>Hygiène & Entretien</option>
            <option>Fournitures</option>
          </select>
        </div>
        <input name="imageUrl" placeholder="URL Image (Optionnel)" class="w-full px-3.5 py-2.5 rounded-xl border border-line text-sm">
        <div class="flex gap-2">
          <button type="submit" class="flex-1 bg-bazaar text-white font-bold rounded-xl py-2.5 text-xs transition">Valider</button>
          <button type="button" id="abort-add-product" class="px-4 border border-line text-xs font-semibold text-inkfade rounded-xl">Annuler</button>
        </div>
      </form>`;
      document.getElementById('abort-add-product').addEventListener('click', () => { panel.innerHTML = ''; });
      document.getElementById('add-product-form').addEventListener('submit', async e => {
        e.preventDefault();
        const fd = new FormData(e.target);
        try {
          await addDoc(collection(S.db, 'products'), {
            storeId: me.uid,
            name: fd.get('name').trim(),
            price: Number(fd.get('price')),
            category: fd.get('category'),
            imageUrl: fd.get('imageUrl').trim() || null,
            stockStatus: true,
            createdAt: serverTimestamp()
          });
          toast('Article inséré !');
          panel.innerHTML = '';
        } catch (err) { toast('Erreur : ' + err.message, 'err'); }
      });
    });

    document.querySelectorAll('[data-product-stock-toggle]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const pid = btn.dataset.productStockToggle;
        const state = btn.dataset.currentState === 'true';
        try {
          await updateDoc(doc(S.db, 'products', pid), { stockStatus: !state });
        } catch (err) { toast('Erreur : ' + err.message, 'err'); }
      });
    });

    document.querySelectorAll('[data-product-delete]').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('Supprimer définitivement cet article ?')) return;
        try {
          await deleteDoc(doc(S.db, 'products', btn.dataset.productDelete));
          toast('Article supprimé');
        } catch (err) { toast('Erreur : ' + err.message, 'err'); }
      });
    });
  }

  if (tab === 'qr') {
    document.getElementById('qr-holder') && (() => {
      document.getElementById('qr-holder').innerHTML = '';
      new QRCode(document.getElementById('qr-holder'), {
        text: me.uid, width: 160, height: 160, colorDark: '#0B6E4F', colorLight: '#ffffff'
      });
    })();
  }

  if (tab === 'profile') {
    document.getElementById('store-profile-update')?.addEventListener('submit', async e => {
      e.preventDefault();
      const fd = new FormData(e.target);
      try {
        await updateDoc(doc(S.db, 'stores', me.uid), {
          storeName: fd.get('storeName').trim(),
          phone: fd.get('phone').trim(),
          address: fd.get('address').trim()
        });
        toast('Profil de la boutique actualisé !');
      } catch (err) { toast('Erreur : ' + err.message, 'err'); }
    });
  }
}

/* ==========================================================================
   ROLE: DELIVERY AGENT (LIVREUR)
   ========================================================================== */
function renderAgent() {
  const me = S.profiles.agent;
  const meUser = S.data.users.find(u => u.uid === me.uid) || { activeStatus: false };
  const tab = S._tab.agent || 'tasks';
  const myDeliveries = S.data.orders.filter(o => o.agentId === me.uid);
  const activeTasks = myDeliveries.filter(o => !['delivered','cancelled'].includes(o.status));

  let body = '';

    body = `

      <div class="space-y-4">
        ${activeTasks.length === 0 ? renderEmptyState('fa-route', 'Aucune course en cours assignée') : activeTasks.map(o => `

          <div class="flex justify-between items-center pb-2 border-b border-line">
            <div>
              <p class="text-[10px] text-inkfade font-bold uppercase tracking-wider">Point de Retrait (Magasin)</p>

            <p class="text-[11px] text-inkfade mt-1 leading-relaxed"><i class="fa-solid fa-location-dot text-clay me-1"></i>${esc(o.clientAddress)}</p>

          <div class="bg-cream rounded-2xl p-3 text-xs space-y-1 border border-line">
            <div class="flex justify-between font-semibold">
              <span class="text-inkfade">Frais de livraison</span>
              <span class="font-mono text-ink">${fmtDA(o.deliveryFee)}</span>

              <span class="font-mono text-bazaar">${fmtDA(o.totalAmount + o.deliveryFee)}</span>
            </div>

          <div class="bg-clay/10 border border-clay/20 p-3 rounded-xl flex gap-2 items-start text-xs text-clay">
            <i class="fa-solid fa-triangle-exclamation text-sm mt-0.5"></i>
            <div>
              <p class="font-bold">CONTRAT AMANA REQUIS</p>
              <p class="text-[10px] opacity-90 mt-0.5 leading-tight">Vous devez avancer <b class="font-mono font-bold">${fmtDA(o.totalAmount)}</b> en espèces au commerçant à l'étape du retrait.</p>
            </div>
          </div>` : `
          <div class="bg-mint/40 border border-bazaar/20 p-3 rounded-xl flex gap-2 items-start text-xs text-bazaar">
            <i class="fa-solid fa-circle-info text-sm mt-0.5"></i>
            <div>
              <p class="font-bold">Livraison Standard (Sans Amana)</p>
              <p class="text-[10px] opacity-90 mt-0.5 leading-tight">Aucun paiement d'avance requis. Encaissez l'intégralité chez le client final.</p>

            ${o.status === 'picked_up' ? `<button data-task-deliver="${o.id}" class="flex-1 bg-bazaar hover:bg-bazaar-dark text-white text-xs font-bold py-3 rounded-xl transition shadow-pop">Confirmer la Livraison Client</button>` : ''}

    ${topHeader('Espace Livreur', me.name)}
    ${body}
    ${renderBottomNav()}
  `;

  bindCommonControls();

  document.getElementById('agent-online-toggle')?.addEventListener('click', async () => {
    try {
      await updateDoc(doc(S.db, 'users', me.uid), { activeStatus: !meUser.activeStatus });
      toast(!meUser.activeStatus ? 'Vous êtes maintenant En Ligne !' : 'Vous êtes maintenant Hors Ligne.');
    } catch (err) { toast('Erreur : ' + err.message, 'err'); }
  });

  document.querySelectorAll('[data-task-pickup]').forEach(btn => {
    btn.addEventListener('click', async () => {
      try {
        await updateDoc(doc(S.db, 'orders', btn.dataset.taskPickup), { status: 'picked_up' });
        toast('Retrait validé avec succès !');
      } catch (err) { toast('Erreur : ' + err.message, 'err'); }
    });
  });

  document.querySelectorAll('[data-task-deliver]').forEach(btn => {
    btn.addEventListener('click', async () => {
      try {
        await updateDoc(doc(S.db, 'orders', btn.dataset.taskDeliver), { status: 'delivered' });
        toast('Colis livré avec succès ! Félicitations ! 🎉');
      } catch (err) { toast('Erreur : ' + err.message, 'err'); }
    });
  });

  document.querySelectorAll('[data-task-cancel]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Voulez-vous vraiment annuler la livraison de cette commande ?')) return;
      try {
        await updateDoc(doc(S.db, 'orders', btn.dataset.taskCancel), { status: 'cancelled' });
        toast('Mission de livraison annulée', 'info');
      } catch (err) { toast('Erreur : ' + err.message, 'err'); }
    });
  });
}

/* ==========================================================================
   ROLE: CLIENT SCREEN
   ========================================================================== */
function renderClient() {
  const me = S.profiles.client;
  const meUser = S.data.users.find(u => u.uid === me.uid) || { favoriteStores: [] };
  const favStores = S.data.stores.filter(s => (meUser.favoriteStores || []).includes(s.id));
  const tab = S._tab.client || 'stores';

  let body = '';
  if (tab === 'stores') {
    if (S.client.activeStoreId) {
      body = renderStoreMenu(S.client.activeStoreId);
    } else {
      body = `
      <div class="px-5 mt-4 space-y-4 rise-in">
        <div class="bg-paper rounded-3xl shadow-card p-5">
          <p class="text-[10px] font-bold text-inkfade uppercase tracking-widest font-display mb-2.5">Associer une Épicerie</p>
          <form id="add-store-favorite" class="flex gap-2">
            <input required name="code" placeholder="Code à 5 chiffres de la boutique" class="flex-1 px-4 py-2.5 rounded-xl border border-line text-sm font-mono tracking-wider">
            <button type="submit" class="bg-bazaar hover:bg-bazaar-dark text-white px-4 rounded-xl text-xs font-bold transition flex items-center justify-center gap-1.5"><i class="fa-solid fa-plus"></i></button>
          </form>
          <p class="text-[10px] text-inkfade mt-2 leading-relaxed">Associez un magasin de meubles ou une épicerie en entrant son code unique à 5 chiffres (généré sur son profil).</p>
        </div>

        <p class="text-[10px] font-bold text-inkfade uppercase tracking-widest font-display px-1">Mes Boutiques Connectées</p>
        <div class="space-y-3">
          ${favStores.length === 0 ? renderEmptyState('fa-shop-slash', 'Saisissez un code boutique pour commencer vos achats') : favStores.map(st => `
          <div class="bg-paper rounded-2xl shadow-card p-4 flex items-center justify-between transition hover:border-bazaar/20 border border-transparent">
            <div data-client-open-store="${st.id}" class="flex-1 min-w-0 flex items-center gap-3 cursor-pointer">
              <div class="w-10 h-10 rounded-xl bg-mint flex items-center justify-center text-bazaar"><i class="fa-solid fa-store"></i></div>
              <div class="flex-1 min-w-0">
                <p class="font-bold text-sm text-ink truncate">${esc(st.storeName)}</p>
                <p class="text-[11px] text-inkfade truncate">${esc(st.address || 'Algérie')}</p>
              </div>
            </div>
            <button data-client-unfav-store="${st.id}" class="w-8 h-8 rounded-xl bg-clay/5 hover:bg-clay/10 text-clay flex items-center justify-center transition"><i class="fa-solid fa-heart-broken text-xs"></i></button>
          </div>`).join('')}
        </div>
      </div>`;
    }
  } else if (tab === 'cart') {
    body = renderCart();
  } else if (tab === 'orders') {
    const myOrders = S.data.orders.filter(o => o.clientId === me.uid).sort((a,b)=> (b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    body = `
    <div class="px-5 mt-4 space-y-4 rise-in">
      ${myOrders.length === 0 ? renderEmptyState('fa-receipt', "Vous n'avez pas encore passé de commande") : myOrders.map(o => `
      <div class="bg-paper rounded-3xl shadow-card p-4 space-y-3">
        <div class="flex justify-between items-center pb-1">
          <div>
            <p class="font-bold text-sm text-ink">${esc(getStoreName(o.storeId))}</p>
            <p class="text-[10px] text-inkfade">${timeAgo(o.createdAt)}</p>
          </div>
          ${renderStatusTag(o.status)}
        </div>
        
        <div class="bg-cream rounded-2xl p-3 text-xs space-y-1">
          ${o.items.map(it => `
            <div class="flex justify-between text-ink">
              <span>${it.qty}x ${esc(it.name)}</span>
              <span class="font-mono text-inkfade">${fmtDA(it.price * it.qty)}</span>
            </div>`).join('')}
          <div class="pt-2 mt-1 border-t border-line flex justify-between font-black text-ink">
            <span>Total Payé</span>
            <span class="font-mono text-bazaar">${fmtDA(o.totalAmount + o.deliveryFee)}</span>
          </div>
        </div>
      </div>`).join('')}
    </div>`;
  } else if (tab === 'profile') {
    body = `
    <div class="px-5 mt-4 rise-in">
      <div class="bg-paper rounded-3xl p-5 shadow-card text-center">
        <div class="w-14 h-14 rounded-2xl bg-mint text-bazaar flex items-center justify-center mx-auto mb-3 shadow-card"><i class="fa-solid fa-user text-xl"></i></div>
        <h3 class="font-display font-black text-lg text-ink">${esc(me.name)}</h3>
        <p class="text-xs text-inkfade font-mono font-medium">${esc(me.phone)}</p>
      </div>
    </div>`;
  }

  $app.innerHTML = `
    ${renderDevBar()}
    ${topHeader(S.client.activeStoreId ? '' : 'Bienvenue 👋', S.client.activeStoreId ? '' : me.name)}
    ${body}
    ${renderBottomNav()}
  `;

  bindCommonControls();
  bindClientEvents(me, meUser);
}

function renderStoreMenu(storeId) {
  const st = S.data.stores.find(s => s.id === storeId);
  const products = S.data.products.filter(p => p.storeId === storeId);
  return `
  <div class="px-5 mt-4 space-y-4 rise-in">
    <button id="client-back-to-stores" class="text-bazaar text-xs font-black uppercase tracking-wider flex items-center gap-1.5 transition hover:translate-x-[-2px]">
      <i class="fa-solid fa-arrow-left"></i> Retour aux Boutiques
    </button>
    
    <div class="bg-bazaar rounded-3xl p-5 text-white shadow-card">
      <h2 class="font-display font-black text-lg">${esc(st?.storeName)}</h2>
      <p class="text-white/70 text-xs mt-1"><i class="fa-solid fa-location-dot me-1 text-souk"></i> ${esc(st?.address || 'Algérie')}</p>
    </div>

    <div class="space-y-3">
      ${products.length === 0 ? renderEmptyState('fa-box-open', 'Aucun produit disponible dans cette boutique') : products.map(p => `
      <div class="bg-paper rounded-2xl shadow-card p-3 flex items-center gap-3 ${!p.stockStatus ? 'opacity-50' : ''}">
        <img src="${p.imageUrl || 'https://placehold.co/120x120/E7F2EC/0B6E4F?text=%F0%9F%9B%92'}" class="w-12 h-12 rounded-xl object-cover bg-mint border border-line">
        <div class="flex-1 min-w-0">
          <p class="font-bold text-sm text-ink truncate">${esc(p.name)}</p>
          <p class="text-xs font-mono font-semibold text-inkfade mt-0.5">${fmtDA(p.price)}</p>
        </div>
        ${p.stockStatus ? `
        <div class="flex items-center gap-2.5">
          <button data-cart-decrement="${p.id}" class="w-7 h-7 rounded-lg bg-cream hover:bg-line text-ink flex items-center justify-center text-xs font-black transition">−</button>
          <span class="text-sm font-bold w-4 text-center text-ink">${S.client.cart[p.id] || 0}</span>
          <button data-cart-increment="${p.id}" data-store="${storeId}" class="w-7 h-7 rounded-lg bg-bazaar hover:bg-bazaar-dark text-white flex items-center justify-center text-xs font-black transition">+</button>
        </div>` : `<span class="text-[10px] font-bold text-clay uppercase tracking-wider px-2 py-1 bg-clay/5 rounded-lg">Épuisé</span>`}
      </div>`).join('')}
    </div>
  </div>`;
}

function renderCart() {
  const itemsInCart = Object.keys(S.client.cart).filter(id => S.client.cart[id] > 0);
  if (itemsInCart.length === 0) {
    return `<div class="px-5 mt-4 rise-in">${renderEmptyState('fa-cart-shopping', 'Votre panier de courses est actuellement vide')}</div>`;
  }

  const items = itemsInCart.map(id => {
    const p = S.data.products.find(item => item.id === id);
    return p ? { ...p, qty: S.client.cart[id] } : null;
  }).filter(Boolean);

  const storeId = items[0]?.storeId;
  const store = S.data.stores.find(s => s.id === storeId);
  const subtotal = items.reduce((sum, it) => sum + (it.price * it.qty), 0);
  const deliveryFee = 150; // Algérien Standard delivery flat fee

  return `
  <div class="px-5 mt-4 space-y-4 rise-in">
    <p class="text-[10px] font-bold text-inkfade uppercase tracking-widest font-display px-1">Votre Commande de : <span class="text-bazaar">${esc(store?.storeName)}</span></p>
    
    <div class="bg-paper rounded-3xl shadow-card p-5 space-y-3">
      ${items.map(it => `
      <div class="flex items-center justify-between py-2 border-b border-line last:border-0 text-sm">
        <div class="min-w-0">
          <p class="font-bold text-ink truncate">${esc(it.name)}</p>
          <p class="text-xs text-inkfade mt-0.5 font-mono">${fmtDA(it.price)} × ${it.qty}</p>
        </div>
        <div class="flex items-center gap-2">
          <button data-cart-decrement="${it.id}" class="w-7 h-7 rounded-lg bg-cream hover:bg-line text-ink flex items-center justify-center text-xs font-bold transition">−</button>
          <span class="text-sm font-bold w-4 text-center text-ink">${it.qty}</span>
          <button data-cart-increment="${it.id}" data-store="${it.storeId}" class="w-7 h-7 rounded-lg bg-bazaar hover:bg-bazaar-dark text-white flex items-center justify-center text-xs font-bold transition">+</button>
        </div>
      </div>`).join('')}
      
      <div class="pt-3 flex justify-between text-xs font-medium text-inkfade">
        <span>Sous-total articles</span>
        <span class="font-mono">${fmtDA(subtotal)}</span>
      </div>
      <div class="flex justify-between text-xs font-medium text-inkfade">
        <span>Frais de livraison standard</span>
        <span class="font-mono">${fmtDA(deliveryFee)}</span>
      </div>
      <div class="pt-3 border-t border-line flex justify-between font-black text-ink">
        <span>Total Général</span>
        <span class="font-mono text-bazaar text-base">${fmtDA(subtotal + deliveryFee)}</span>
      </div>
    </div>

    <div class="bg-paper rounded-3xl shadow-card p-5">
      <p class="text-[10px] font-bold text-inkfade uppercase tracking-widest font-display mb-3">Informations de Livraison</p>
      <form id="client-checkout-form" class="space-y-3">
        <input required name="clientName" placeholder="Nom Complet Destinataire" class="w-full px-3.5 py-2.5 rounded-xl border border-line text-sm">
        <input required name="clientPhone" pattern="0[5-7][0-9]{8}" placeholder="Téléphone Portable (Ex: 05xxxxxxxx)" class="w-full px-3.5 py-2.5 rounded-xl border border-line text-sm font-mono">
        <textarea required name="clientAddress" rows="2" placeholder="Adresse précise de livraison à Sétif" class="w-full px-3.5 py-2.5 rounded-xl border border-line text-sm"></textarea>
        
        <div class="bg-cream p-3 rounded-xl flex items-center gap-2.5 text-xs text-inkfade font-semibold border border-line">
          <i class="fa-solid fa-wallet text-bazaar text-sm"></i>
          <span>Paiement Cash à la Livraison (الدفع عند الاستلام)</span>
        </div>

        <button type="submit" data-store-id="${storeId}" data-subtotal="${subtotal}" data-delivery-fee="${deliveryFee}" class="w-full bg-bazaar hover:bg-bazaar-dark text-white font-bold rounded-xl py-3.5 mt-2 transition shadow-pop flex items-center justify-center gap-2">
          <span>Confirmer l'Achat · ${fmtDA(subtotal + deliveryFee)}</span>
        </button>
      </form>
    </div>
  </div>`;
}

function bindClientEvents(me, meUser) {
  document.getElementById('add-store-favorite')?.addEventListener('submit', async e => {
    e.preventDefault();
    const rawCode = new FormData(e.target).get('code').trim();
    const match = S.data.stores.find(s => s.id === rawCode || storeCodeFromId(s.id) === rawCode);
    
    if (!match) {
      toast('Aucune boutique ne possède ce code', 'err');
      return;
    }
    if ((meUser.favoriteStores || []).includes(match.id)) {
      toast('Cette boutique est déjà dans vos favoris');
      return;
    }

    try {
      await updateDoc(doc(S.db, 'users', me.uid), { favoriteStores: arrayUnion(match.id) });
      await updateDoc(doc(S.db, 'stores', match.id), { favoriteCount: increment(1) });
      toast(`${match.storeName} ajoutée avec succès !`);
      e.target.reset();
    } catch (err) { toast('Erreur : ' + err.message, 'err'); }
  });

  document.querySelectorAll('[data-client-unfav-store]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const storeId = btn.dataset.clientUnfav-store;
      if (!confirm('Retirer cette boutique de vos favoris ?')) return;
      try {
        await updateDoc(doc(S.db, 'users', me.uid), { favoriteStores: arrayRemove(storeId) });
        await updateDoc(doc(S.db, 'stores', storeId), { favoriteCount: increment(-1) });
        toast('Boutique retirée de vos favoris', 'info');
      } catch (err) { toast('Erreur : ' + err.message, 'err'); }
    });
  });

  document.querySelectorAll('[data-client-open-store]').forEach(el => {
    el.addEventListener('click', () => {
      S.client.activeStoreId = el.dataset.clientOpenStore;
      render();
    });
  });

  document.getElementById('client-back-to-stores')?.addEventListener('click', () => {
    S.client.activeStoreId = null;
    render();
  });

  document.querySelectorAll('[data-cart-increment]').forEach(btn => {
    btn.addEventListener('click', () => {
      const storeId = btn.dataset.store;
      const otherStoreActive = Object.keys(S.client.cart).some(id => S.client.cart[id] > 0 && S.data.products.find(p=>p.id===id)?.storeId !== storeId);
      
      if (otherStoreActive) {
        if (!confirm('Votre panier contient déjà des produits d\'une autre boutique. Vider le panier et ajouter ce nouvel article ?')) return;
        S.client.cart = {};
      }
      
      const pid = btn.dataset.cartIncrement;
      S.client.cart[pid] = (S.client.cart[pid] || 0) + 1;
      saveCart();
      render();
    });
  });

  document.querySelectorAll('[data-cart-decrement]').forEach(btn => {
    btn.addEventListener('click', () => {
      const pid = btn.dataset.cartDecrement;
      S.client.cart[pid] = Math.max(0, (S.client.cart[pid] || 0) - 1);
      saveCart();
      render();
    });
  });

  document.getElementById('client-checkout-form')?.addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const btn = e.target.querySelector('button[type=submit]');
    const storeId = btn.dataset.storeId;
    const subtotal = Number(btn.dataset.subtotal);
    const deliveryFee = Number(btn.dataset.deliveryFee);

    const itemsOrdered = Object.keys(S.client.cart).filter(id => S.client.cart[id] > 0).map(id => {
      const p = S.data.products.find(item => item.id === id);
      return p ? { productId: id, name: p.name, price: p.price, qty: S.client.cart[id] } : null;
    }).filter(Boolean);

    try {
      await addDoc(collection(S.db, 'orders'), {
        storeId,
        clientId: me.uid,
        clientName: fd.get('clientName').trim(),
        clientPhone: fd.get('clientPhone').trim(),
        clientAddress: fd.get('clientAddress').trim(),
        items: itemsOrdered,
        totalAmount: subtotal,
        deliveryFee: deliveryFee,
        agentId: null,
        status: 'pending',
        cashWorkflow: 'collected_on_delivery',
        createdAt: serverTimestamp()
      });
      S.client.cart = {};
      saveCart();
      S.client.activeStoreId = null;
      S._tab.client = 'orders';
      toast('Votre commande a bien été transmise au magasin ! 🎉');
      render();
    } catch (err) { toast('Erreur : ' + err.message, 'err'); }
  });
}

/* ==========================================================================
   MAIN ROUTING & RENDERING ENGINE
   ========================================================================== */
function render() {
  if (!S.role) {
    $app.innerHTML = `
    ${renderDevBar()}
    <div class="px-6 py-16 text-center rise-in">
      <div class="w-16 h-16 mx-auto rounded-3xl bg-bazaar flex items-center justify-center shadow-pop mb-5 animate-pulse">
        <i class="fa-solid fa-route text-white text-2xl"></i>
      </div>
      <h1 class="font-display font-black text-2xl text-ink">SOUGI LOGISTIQUE</h1>
      <p class="text-inkfade text-sm mt-2 mb-8 leading-relaxed">Solution de livraison locale de confiance en Algérie.<br>Sélectionnez un rôle ci-dessus pour tester la synchronisation.</p>
    </div>`;
    S.devBarOpen = true;
    bindCommonControls();
    return;
  }

  if (!S.profiles[S.role]) {
    $app.innerHTML = `
      ${renderDevBar()}
      ${renderLoginGate()}
    `;
    bindCommonControls();
    bindLoginGate();
    return;
  }

  // Active Role routing
  if (S.role === 'admin') renderAdmin();
  else if (S.role === 'grocery') renderGrocery();
  else if (S.role === 'agent') renderAgent();
  else if (S.role === 'client') renderClient();
}

/* ---------------------- Initialization ---------------------- */
(function boot() {
  loadLocalData();
  initFirebase();
  startRealtimeSync();
  // Set default tabs if non-existent
  S._tab = { admin: 'dashboard', grocery: 'orders', agent: 'tasks', client: 'stores' };
  render();
})();
</script>
</body>
</html>
